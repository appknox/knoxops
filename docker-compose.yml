version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: knoxadmin-db
    environment:
      POSTGRES_USER: knoxadmin
      POSTGRES_PASSWORD: knoxadmin
      POSTGRES_DB: knoxadmin
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U knoxadmin']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
