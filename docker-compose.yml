version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: knoxadmin-db
    environment:
      POSTGRES_USER: knoxadmin
      POSTGRES_PASSWORD: knoxadmin
      POSTGRES_DB: knoxadmin
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U knoxadmin']
      interval: 10s
      timeout: 5s
      retries: 5

  knoxops:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knoxops
    env_file: .env
    environment:
      DATABASE_URL: postgres://knoxadmin:knoxadmin@postgres:5432/knoxadmin
      RUN_MIGRATIONS: "true"
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  knoxops-client:
    build:
      context: ../knoxops-client
      dockerfile: Dockerfile
    container_name: knoxops-client
    ports:
      - '80:80'
    depends_on:
      - knoxops

volumes:
  postgres_data:
