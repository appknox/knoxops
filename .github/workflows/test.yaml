name: Run Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: knoxadmin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://admin:admin123@localhost:5432/knoxadmin_test
      NODE_ENV: test
      JWT_SECRET: test-jwt-secret-not-for-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      HOST: 0.0.0.0
      APP_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:5173
      # External services are mocked in tests — dummy values prevent startup errors
      SMTP_HOST: localhost
      SMTP_PORT: 587
      SMTP_SECURE: false
      SMTP_USER: test@test.com
      SMTP_PASS: test
      SMTP_FROM: test@test.com
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: test-bucket
      AWS_ACCESS_KEY_ID: test-key
      AWS_SECRET_ACCESS_KEY: test-secret
      AWS_S3_SIGNED_URL_EXPIRY: 3600
      SLACK_WEBHOOK_URL: https://hooks.slack.com/test
      SLACK_DEVICE_WEBHOOK_URL: https://hooks.slack.com/test
      GITHUB_TOKEN: test-token
      GITHUB_OWNER: test
      GITHUB_REPO: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations against test DB
        run: DATABASE_URL=postgres://admin:admin123@localhost:5432/knoxadmin_test npm run db:migrate

      - name: Run tests
        run: npm run test:run
